name: Deploy to Firebase Hosting on PR
on: pull_request
permissions:
  checks: write
  contents: read
  pull-requests: write
jobs:
  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm ci && npm run build
        env:
          VITE_FIREBASE_API_KEY: AIzaSyBJ5h6ifqPZUyLKhHl5SDXsY9S8b85C280
          VITE_FIREBASE_AUTH_DOMAIN: myjob-d8d17.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: myjob-d8d17
          VITE_FIREBASE_STORAGE_BUCKET: myjob-d8d17.firebasestorage.app
          VITE_FIREBASE_MESSAGING_SENDER_ID: "108918149666"
          VITE_FIREBASE_APP_ID: 1:108918149666:web:c53adbe4aa1fea796e707b
          VITE_FIREBASE_MEASUREMENT_ID: G-PNJ3QJGZ0N
          NODE_OPTIONS: "--max-old-space-size=4096"
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_MYJOB_D8D17 }}
          projectId: myjob-d8d17
